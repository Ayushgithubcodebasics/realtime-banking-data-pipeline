name: CD - dbt Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-dbt:
    name: dbt run and test in Snowflake
    runs-on: ubuntu-latest
    if: ${{ secrets.SNOWFLAKE_ACCOUNT != '' && secrets.SNOWFLAKE_USER != '' && secrets.SNOWFLAKE_PASSWORD != '' && secrets.SNOWFLAKE_WAREHOUSE != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt-snowflake
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-snowflake>=1.9.0,<2.0.0"

      - name: Write dbt profile
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          banking_dbt:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${SNOWFLAKE_ACCOUNT}"
                user: "${SNOWFLAKE_USER}"
                password: "${SNOWFLAKE_PASSWORD}"
                role: "${SNOWFLAKE_ROLE:-TRANSFORMER}"
                database: "BANKING"
                warehouse: "${SNOWFLAKE_WAREHOUSE}"
                schema: "ANALYTICS"
                threads: 4
          EOF

      - name: dbt deps
        working-directory: banking_dbt
        run: dbt deps

      - name: dbt run staging
        working-directory: banking_dbt
        run: dbt run --select staging

      - name: dbt snapshot
        working-directory: banking_dbt
        run: dbt snapshot

      - name: dbt run marts
        working-directory: banking_dbt
        run: dbt run --select marts

      - name: dbt test
        working-directory: banking_dbt
        run: dbt test
