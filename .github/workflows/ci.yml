name: CI - Lint, Test, dbt Parse

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: pytest tests -v

  dbt-parse:
    name: dbt parse
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt-snowflake
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-snowflake>=1.9.0,<2.0.0"

      - name: Write dummy dbt profile for parse
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          banking_dbt:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "dummy-account"
                user: "dummy-user"
                password: "dummy-password"
                role: "TRANSFORMER"
                database: "BANKING"
                warehouse: "COMPUTE_WH"
                schema: "ANALYTICS"
                threads: 1
          EOF

      - name: dbt deps + parse
        working-directory: banking_dbt
        run: |
          dbt deps
          dbt parse
