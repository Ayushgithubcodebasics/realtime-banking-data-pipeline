version: 2

models:
  - name: pbi_dim_customers_current
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: pbi_dim_accounts_current
    columns:
      - name: account_id
        tests: [not_null, unique]

  - name: pbi_fact_transactions
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: account_sk
        tests: [not_null]
      - name: customer_sk
        tests: [not_null]

  - name: pbi_dim_date
    columns:
      - name: date_day
        tests: [not_null, unique]
