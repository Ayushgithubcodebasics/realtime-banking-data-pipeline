version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_sk
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: is_current
        tests: [not_null]

  - name: dim_accounts
    columns:
      - name: account_sk
        tests: [not_null, unique]
      - name: account_id
        tests: [not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

  - name: fact_transactions
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: account_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_sk
      - name: customer_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_sk
      - name: transaction_type
        tests:
          - accepted_values:
              arguments:
                values: ["DEPOSIT", "WITHDRAWAL", "TRANSFER"]
