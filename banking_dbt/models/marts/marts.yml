version: 2

models:
  - name: dim_customers
    description: "SCD2 customer dimension — Gold layer"
    columns:
      - name: customer_sk
        description: "Surrogate key (dbt snapshot)"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: email
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null

  - name: dim_accounts
    description: "SCD2 account dimension — Gold layer"
    columns:
      - name: account_sk
        tests:
          - unique
          - not_null
      - name: account_id
        tests:
          - not_null
      - name: account_type
        tests:
          - accepted_values:
              values: ["SAVINGS", "CHECKING"]

  - name: fact_transactions
    description: "Incremental transaction fact table — Gold layer"
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: account_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null
      - name: transaction_type
        tests:
          - accepted_values:
              values: ["DEPOSIT", "WITHDRAWAL", "TRANSFER"]
