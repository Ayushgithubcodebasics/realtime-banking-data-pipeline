name: "banking_dbt"
version: "1.0.0"
config-version: 2

profile: "banking_dbt"

# Paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
docs-paths: ["docs"]

clean-targets:
  - "target"
  - "dbt_packages"

# ── Model materialisation defaults ────────────────────────────
models:
  banking_dbt:
    staging:
      +materialized: view

    marts:
      dimensions:
        +materialized: table

      facts:
        +materialized: incremental

# ── Snapshot config ───────────────────────────────────────────
snapshots:
  banking_dbt:
    +target_schema: ANALYTICS

# ── Variable defaults ─────────────────────────────────────────
vars:
  start_date: "2024-01-01"